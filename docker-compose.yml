version: "3.8"

services:
  vortex-node-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vortex-node-1
    hostname: vortex-node-1
    ports:
      - "9090:9090"
      - "8090:8090"
      - "9100:9100"
    environment:
      - VORTEX_NODE_ID=node-1
      - VORTEX_BIND=0.0.0.0:9090
      - VORTEX_ADMIN_PORT=8090
      - VORTEX_METRICS_PORT=9100
      - VORTEX_PEERS=vortex-node-2:9090,vortex-node-3:9090
    networks:
      - vortex-net

  vortex-node-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vortex-node-2
    hostname: vortex-node-2
    ports:
      - "9091:9090"
      - "8091:8090"
      - "9101:9100"
    environment:
      - VORTEX_NODE_ID=node-2
      - VORTEX_BIND=0.0.0.0:9090
      - VORTEX_ADMIN_PORT=8090
      - VORTEX_METRICS_PORT=9100
      - VORTEX_PEERS=vortex-node-1:9090,vortex-node-3:9090
    networks:
      - vortex-net

  vortex-node-3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vortex-node-3
    hostname: vortex-node-3
    ports:
      - "9092:9090"
      - "8092:8090"
      - "9102:9100"
    environment:
      - VORTEX_NODE_ID=node-3
      - VORTEX_BIND=0.0.0.0:9090
      - VORTEX_ADMIN_PORT=8090
      - VORTEX_METRICS_PORT=9100
      - VORTEX_PEERS=vortex-node-1:9090,vortex-node-2:9090
    networks:
      - vortex-net

networks:
  vortex-net:
    driver: bridge
