site_name: vortex-mq
site_description: Distributed in-memory message broker
site_url: https://github.com/LaplacesD/vortex-mq
repo_url: https://github.com/LaplacesD/vortex-mq
repo_name: LaplacesD/vortex-mq

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.highlight

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Architecture: architecture.md
  - Clustering: clustering.md

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.highlight

plugins:
  - search
